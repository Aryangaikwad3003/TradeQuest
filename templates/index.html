{% extends "base.html" %}

{% block title %}TradeQuest - Welcome{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="text-center mb-2">
        <h1 style="color: var(--primary-color);">Welcome to TradeQuest</h1>
        <p>Please enter your details to begin the assessment.</p>
    </div>

    <form action="{{ url_for('start_quiz') }}" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe" value="{{ session.get('user_name', '') }}">
        </div>

        <div class="form-group">
            <label for="employee_id">Employee ID</label>
            <input type="text" id="employee_id" name="employee_id" required placeholder="EMP123" value="{{ session.get('employee_id', '') }}">
        </div>

        <div class="form-group">
            <label for="quiz_id">Select Quiz</label>
            <select id="quiz_id" name="quiz_id" required>
                <option value="" disabled selected>-- Choose a Quiz --</option>
                {% for quiz in quizzes %}
                    <option value="{{ quiz.id }}">{{ quiz.title }}</option>
                {% endfor %}
            </select>
            {% if not quizzes %}
                <small style="color: var(--danger-color); display: block; margin-top: 0.5rem;">No active quizzes available at the moment.</small>
            {% endif %}
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-4" {% if not quizzes %}disabled{% endif %}>Start Quiz</button>
    </form>
</div>
{% endblock %}
