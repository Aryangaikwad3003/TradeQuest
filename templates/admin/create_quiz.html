{% extends "base.html" %}

{% block title %}TradeQuest - Create Quiz{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-2">
    <h2>Create New Quiz</h2>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('create_quiz') }}" method="POST">
        <div class="form-group">
            <label for="title">Quiz Subject / Title</label>
            <input type="text" id="title" name="title" required placeholder="e.g. Q2 Compliance Training">
        </div>
        
        <div class="form-group">
            <label for="pass_percentage">Pass Percentage (%)</label>
            <input type="number" id="pass_percentage" name="pass_percentage" required min="1" max="100" placeholder="e.g. 60">
        </div>

        <div class="form-group">
            <label for="max_attempts">Max Attempts Allowed</label>
            <input type="number" id="max_attempts" name="max_attempts" required min="1" placeholder="e.g. 3">
        </div>
        
        <div class="form-group">
            <label for="time_limit">Time Limit per Question (seconds)</label>
            <input type="number" id="time_limit" name="time_limit" required min="5" value="60" placeholder="e.g. 60">
        </div>
        
        <p style="font-size: 0.875rem;"><em>Note: The quiz will be created as "Inactive" by default. You can add questions and then activate it from the dashboard.</em></p>

        <button type="submit" class="btn btn-primary mt-2">Create Quiz</button>
    </form>
</div>
{% endblock %}
